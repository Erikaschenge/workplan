<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorkPlan — Plánovač výroby</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d12;--bg2:#13131c;--bg3:#1a1a27;--bg4:#22222f;
  --border:#2a2a3a;--border2:#383850;
  --text:#e8e8f0;--text2:#9898b0;--text3:#5a5a72;
  --acc:#f0a500;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--purple:#a855f7;--teal:#14b8a6;
  --font-head:'Syne',sans-serif;--font-body:'Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --r:10px;--r2:6px;
}
html{height:100%}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;overflow-x:hidden}
::selection{background:rgba(240,165,0,0.3);color:var(--text)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0 0 1rem}
.main{display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.logo{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(--border);margin-bottom:0.5rem}
.logo-mark{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:14px;font-weight:600;color:#000}
.logo-text{font-family:var(--font-head);font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}
.nav-section{padding:0.5rem 0.75rem 0.25rem;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 1.25rem;cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:13px;font-weight:500;position:relative;margin:1px 0;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--acc);background:rgba(240,165,0,0.08)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--acc)}
.nav-icon{width:16px;text-align:center;font-size:15px}
.sidebar-bottom{margin-top:auto;padding:1rem 1.25rem 0;border-top:1px solid var(--border)}
.sidebar-stat{font-size:11px;color:var(--text3);margin-bottom:4px}
.sidebar-stat strong{color:var(--text2)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text)}
.content{flex:1;padding:1.5rem;overflow-y:auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem}
.card-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(ellipse at top right,rgba(240,165,0,0.08) 0%,transparent 70%)}
.stat-n{font-family:var(--font-mono);font-size:26px;font-weight:600;color:var(--text);line-height:1}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px}
.stat-card.blue .stat-n{color:var(--blue)}.stat-card.blue::after{background:radial-gradient(ellipse at top right,rgba(59,130,246,0.1) 0%,transparent 70%)}
.stat-card.green .stat-n{color:var(--green)}.stat-card.green::after{background:radial-gradient(ellipse at top right,rgba(34,197,94,0.1) 0%,transparent 70%)}
.stat-card.purple .stat-n{color:var(--purple)}.stat-card.purple::after{background:radial-gradient(ellipse at top right,rgba(168,85,247,0.1) 0%,transparent 70%)}
.field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:100px}
.field label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
input,select{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:13px;font-family:var(--font-body);transition:border-color 0.15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:var(--acc)}
select option{background:var(--bg3)}
input[type=date],input[type=time]{color-scheme:dark}
.btn{padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);white-space:nowrap;transition:all 0.15s}
.btn:active{transform:scale(0.97)}
.btn-accent{background:var(--acc);color:#000}.btn-accent:hover{background:#f5b800}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-outline:hover{border-color:var(--text2);color:var(--text)}
.btn-danger{background:transparent;border:1px solid transparent;color:var(--text3)}.btn-danger:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:5px}
.btn-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)}.btn-green:hover{background:rgba(34,197,94,0.25)}
.btn-export{background:rgba(59,130,246,0.12);color:var(--blue);border:1px solid rgba(59,130,246,0.3)}.btn-export:hover{background:rgba(59,130,246,0.22)}
.alert{padding:8px 12px;border-radius:var(--r2);font-size:12px;margin-top:8px;line-height:1.7}
.alert-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
.alert-ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac}
.alert-info{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#93c5fd}
.alert-warn{background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.3);color:#fcd34d}
.prof-badge{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.pf-2320{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.25)}
.pf-2325{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.25)}
.pf-2321{background:rgba(240,165,0,0.15);color:#fcd34d;border:1px solid rgba(240,165,0,0.25)}
.pf-other{background:rgba(168,85,247,0.15);color:#d8b4fe;border:1px solid rgba(168,85,247,0.25)}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);display:inline-block}
.badge-free{background:rgba(34,197,94,0.12);color:#86efac;border:1px solid rgba(34,197,94,0.2);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-busy{background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.job-id-tag{font-family:var(--font-mono);font-size:10px;padding:2px 7px;background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text3)}
.job-card{border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:8px;background:var(--bg2);transition:border-color 0.15s,transform 0.1s}
.job-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.job-card.done-card{opacity:0.4}
.job-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.job-name{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin:4px 0 2px}
.job-desc{font-size:11px;color:var(--text3);margin-bottom:8px}
.job-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.meta-pill{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--text2);font-size:11px}
.chips-row{display:flex;flex-wrap:wrap;gap:5px}
.job-actions{display:flex;gap:5px;flex-shrink:0}
.job-tag-line{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.w-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.w-row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--font-mono)}
.av-2320{background:rgba(59,130,246,0.2);color:#93c5fd}
.av-2325{background:rgba(34,197,94,0.2);color:#86efac}
.av-2321{background:rgba(240,165,0,0.2);color:#fcd34d}
.av-other{background:rgba(168,85,247,0.2);color:#d8b4fe}
.w-info{flex:1;min-width:0}
.w-name{font-size:13px;font-weight:600;color:var(--text)}
.w-detail{font-size:11px;color:var(--text3);margin-top:2px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 10px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg3)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,0.02);color:var(--text)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
.gantt-container{overflow-x:auto}
.gantt-header-row{display:flex;border-bottom:1px solid var(--border);background:var(--bg3);position:sticky;top:0;z-index:2}
.g-label{width:210px;flex-shrink:0;padding:6px 10px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);border-right:1px solid var(--border)}
.g-days{display:flex;flex:1}
.g-dh{font-family:var(--font-mono);font-size:9px;color:var(--text3);text-align:center;padding:4px 1px;flex:1;border-right:1px solid rgba(255,255,255,0.03);min-width:34px;line-height:1.2}
.g-dh.wend{background:rgba(239,68,68,0.06);color:#fca5a5}
.g-dh.sat-work{background:rgba(20,184,166,0.08);color:#5eead4}
.g-dh.sun-work{background:rgba(168,85,247,0.08);color:#c4b5fd}
.g-row{display:flex;border-bottom:1px solid rgba(255,255,255,0.04)}
.g-row:hover{background:rgba(255,255,255,0.012)}
.g-name{width:210px;flex-shrink:0;padding:5px 10px;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-right:1px solid var(--border);display:flex;align-items:center;gap:5px}
.g-cells{display:flex;flex:1;height:30px}
.g-cell{flex:1;min-width:34px;border-right:1px solid rgba(255,255,255,0.03);position:relative;overflow:hidden}
.g-cell.wend{background:rgba(239,68,68,0.04)}
.g-cell.sat-work{background:rgba(20,184,166,0.05)}
.g-cell.sun-work{background:rgba(168,85,247,0.05)}
.g-bar{position:absolute;top:50%;transform:translateY(-50%);height:18px;border-radius:3px;left:0}
.g-bar.bar-work{background:var(--acc);opacity:0.85}
.g-bar.bar-sat{background:var(--teal);opacity:0.8}
.g-bar.bar-sun{background:var(--purple);opacity:0.8}
.g-bar.bar-done{background:#555;opacity:0.6}
.g-sub-row .g-cells{height:22px}
.g-sub-row .g-bar{height:12px}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:2.5rem;text-align:center;cursor:pointer;transition:all 0.2s}
.drop-zone:hover,.drop-zone.drag{border-color:var(--acc);background:rgba(240,165,0,0.04)}
.drop-icon{font-size:32px;margin-bottom:10px;opacity:0.5}
.drop-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--text3)}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.section-head h3{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text)}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap}
.fpill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:transparent;transition:all 0.15s;font-family:var(--font-body)}
.fpill:hover{border-color:var(--border2);color:var(--text2)}
.fpill.active{background:var(--acc);color:#000;border-color:var(--acc)}
.col-note{font-size:11px;color:var(--text3);margin-bottom:1rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;line-height:1.6}
.col-note span{font-family:var(--font-mono);background:var(--bg4);padding:1px 5px;border-radius:3px;color:var(--acc)}
.empty-state{text-align:center;padding:3rem;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:0.3}
/* toggle switch */
.sw-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.sw{position:relative;width:36px;height:20px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-track{position:absolute;inset:0;background:var(--bg4);border:1px solid var(--border);border-radius:10px;transition:0.2s;cursor:pointer}
.sw input:checked+.sw-track{background:rgba(240,165,0,0.25);border-color:var(--acc)}
.sw-track::after{content:'';position:absolute;width:14px;height:14px;background:var(--text3);border-radius:50%;left:2px;top:2px;transition:0.2s}
.sw input:checked+.sw-track::after{background:var(--acc);left:18px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.job-card{animation:fadeIn 0.18s ease}
/* OneDrive sync */
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.synced{background:var(--green)}
.sync-dot.syncing{background:var(--acc);animation:pulse 1s infinite}
.sync-dot.offline{background:var(--text3)}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-label{color:var(--text3);font-size:11px}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px 3px 6px;font-size:11px;color:var(--text2)}
.user-avatar{width:20px;height:20px;border-radius:50%;background:rgba(240,165,0,0.2);color:var(--acc);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono)}
.btn-ms{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);padding:6px 12px;border-radius:var(--r2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;gap:6px;transition:all 0.15s}
.btn-ms:hover{background:rgba(59,130,246,0.25)}
.btn-ms-out{background:transparent;border:1px solid var(--border);color:var(--text3);padding:5px 10px;border-radius:var(--r2);font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all 0.15s}
.btn-ms-out:hover{border-color:var(--red);color:var(--red)}
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:1.5rem}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem 3rem;text-align:center;max-width:400px}
.login-logo{width:56px;height:56px;background:var(--acc);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:22px;font-weight:700;color:#000;margin:0 auto 1.25rem}
.login-title{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--text);margin-bottom:0.5rem}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:1.5rem;line-height:1.6}
.login-skip{font-size:11px;color:var(--text3);margin-top:1rem;cursor:pointer;text-decoration:underline}
.login-skip:hover{color:var(--text2)}

</head>
<body>
<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="login-overlay" style="display:flex">
  <div class="login-card">
    <div class="login-logo">WP</div>
    <div class="login-title">Plánovač práce</div>
    <div class="login-sub">Prihláste sa cez Microsoft 365 pre synchronizáciu s OneDrive a spoluprácu s kolegami.</div>
    <button class="btn-ms" style="width:100%;justify-content:center;padding:10px 16px;font-size:14px" onclick="msLogin()">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Prihlásiť sa cez Microsoft
    </button>
    <div class="login-skip" onclick="skipLogin()">Pokračovať bez prihlásenia (len lokálne)</div>
  </div>
</div>

<div class="shell" id="app-shell" style="display:none">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">WP</div>
      <div><div class="logo-text">WorkPlan</div><div class="logo-sub">Výrobný plánovač</div></div>
    </div>
  </div>
  <div class="nav-section">Menu</div>
  <div class="nav-item active" onclick="nav('plan',this)"><span class="nav-icon">◈</span> Plánovanie</div>
  <div class="nav-item" onclick="nav('gantt',this)"><span class="nav-icon">▤</span> Gantt diagram</div>
  <div class="nav-item" onclick="nav('cinnosti',this)"><span class="nav-icon">≡</span> Činnosti</div>
  <div class="nav-item" onclick="nav('workers',this)"><span class="nav-icon">◉</span> Pracovníci</div>
  <div class="nav-section" style="margin-top:0.5rem">Dáta</div>
  <div class="nav-item" onclick="nav('import',this)"><span class="nav-icon">⇑</span> Import XLSX</div>
  <div class="nav-item" onclick="exportAll()"><span class="nav-icon">⇓</span> Export XLSX</div>
  <div class="sidebar-bottom">
    <div class="sidebar-stat">Pracovníci: <strong id="sb-w">0</strong></div>
    <div class="sidebar-stat">Činnosti: <strong id="sb-c">0</strong></div>
    <div class="sidebar-stat">Aktívne úlohy: <strong id="sb-j">0</strong></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Plánovanie</div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="sync-bar" id="sync-bar" style="display:none">
        <div class="sync-dot offline" id="sync-dot"></div>
        <span class="sync-label" id="sync-label">—</span>
      </div>
      <div id="user-area"></div>
      <button class="btn btn-export btn-sm" onclick="exportAll()">⇓ Export XLSX</button>
    </div>
  </div>
  <div class="content">

    <!-- PLAN -->
    <div class="tab-panel active" id="panel-plan">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="card">
        <div class="card-title">Nová úloha</div>
        <div class="card-row" style="margin-bottom:12px">
          <div class="field" style="flex:2;min-width:200px">
            <label>Činnosť</label>
            <select id="cin-select" onchange="onCinChange()"><option value="">— vyber —</option></select>
          </div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
const PAGES={plan:'Plánovanie',gantt:'Gantt diagram',cinnosti:'Činnosti',workers:'Pracovníci',import:'Import XLSX'};
let jobFilter='all';
let S={
  workers:[
    {id:1,name:'Ján Kováč',prof:'2320',hours:8},
    {id:2,name:'Peter Novák',prof:'2320',hours:8},
    {id:3,name:'Mária Horváth',prof:'2325',hours:7.5},

    {id:'MS00-1',cid:'REZANIE',name:'REZANIE IZOLÁCIE',desc:'rezanie izolácie do podzostáv',prof:'2320',nh:40},
    {id:'MS00-2',cid:'TE004611',name:'RÁMY TECH.PROST.',desc:'kamene, ustavenie a zvrtávanie',prof:'2320',nh:30},
    {id:'MS00-3',cid:'LO561513',name:'SCHODY HV5,HV6',desc:'lepenie',prof:'2325',nh:2},
    {id:'MS00-4',cid:'LO560626',name:'OKNÁ ODDÍLU BOČNÉ',desc:'lepenie, tmelenie',prof:'2320',nh:70},
    {id:'MS00-5',cid:'LO563030',name:'KONŠTRUKCIE PODSTROPNÉ',desc:'kamene, montáž do vozu',prof:'2320',nh:50},
  ],

function save(){try{localStorage.setItem('wplan4',JSON.stringify(S))}catch(e){}}

load();

// ═══════════════════════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════════════════════
function todayStr(){return new Date().toISOString().split('T')[0]}
function addDays(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}
function fmtDate(s){if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('sk-SK',{day:'2-digit',month:'2-digit',year:'numeric'})}
function dow(ds){return new Date(ds+'T12:00:00').getDay()} // 0=Sun 6=Sat
function isSat(ds){return dow(ds)===6}
function isSun(ds){return dow(ds)===0}

function isWorkday(ds,allowSat,allowSun){
  const d=dow(ds);
  if(d>=1&&d<=5)return true;
  if(d===6&&allowSat)return true;
  if(d===0&&allowSun)return true;
  return false;
}

function fmtH(h){
  const hh=Math.floor(h);
  const mm=Math.round((h-hh)*60);
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}

function fmtDT(ds,h){return fmtDate(ds)+' '+fmtH(h)}

// ═══════════════════════════════════════════════════════════════════
// HOURLY SCHEDULING ENGINE
// ═══════════════════════════════════════════════════════════════════
// Each job stores schedule: [{wid, date, startH, endH}, ...]
// Slots are in fractional hours from midnight (e.g. 6.0 = 06:00, 14.5 = 14:30)

function getWorkerSlots(wid){
  const out=[];
  S.jobs.forEach(j=>{
    if(j.done)return;
    if(!j.schedule)return;
    j.schedule.forEach(s=>{if(s.wid===wid)out.push(s);});
  });
  return out;
}

// BUG1 FIX:
// dayStartH = clock hour when work starts (e.g. 6.0 = 06:00)
// durationH = how many hours the worker works per day (e.g. 8 = 8 hours)
// dayEndH   = dayStartH + durationH  (e.g. 6 + 8 = 14.0 = 14:00)
// fromH     = first clock hour we can start filling (≥ dayStartH, on first day may be later)
// Returns free intervals as [{from, to}] in absolute clock hours
function freeIntervalsOnDay(wid, date, dayStartH, durationH, fromClockH){
  const dayEndH = dayStartH + durationH;          // e.g. 6 + 8 = 14
  const cursor0 = Math.max(fromClockH, dayStartH); // never before shift start
  if(cursor0 >= dayEndH) return [];                 // no room at all

  const daySlots = getWorkerSlots(wid)
    .filter(s => s.date === date)
    .sort((a, b) => a.startH - b.startH);

  const intervals = [];
  let cursor = cursor0;

  for(const s of daySlots){
    if(s.startH >= dayEndH) break;       // slot starts after shift — ignore
    if(s.endH <= cursor) continue;       // slot already behind cursor
    if(s.startH > cursor){
      intervals.push({from: cursor, to: Math.min(s.startH, dayEndH)});
    }
    cursor = Math.max(cursor, s.endH);
  }
  if(cursor < dayEndH) intervals.push({from: cursor, to: dayEndH});
  return intervals;
}

// Schedule exactly nhNeeded hours for worker wid
// dayStartH = shift start clock hour (e.g. 6), durationH = shift length (e.g. 8)
// On first day we may start later (fromClockH), subsequent days always from dayStartH
function scheduleWorker(wid, nhNeeded, startDate, fromClockH, dayStartH, durationH, allowSat, allowSun){
  const slots = [];
  let remaining = nhNeeded;
  let d = startDate;
  let clockFrom = fromClockH; // first day: may be mid-shift; rest: dayStartH

  for(let i = 0; i < 730 && remaining > 0.0001; i++){
    if(!isWorkday(d, allowSat, allowSun)){ d = addDays(d, 1); clockFrom = dayStartH; continue; }

    const intervals = freeIntervalsOnDay(wid, d, dayStartH, durationH, clockFrom);
    for(const iv of intervals){
      if(remaining <= 0.0001) break;
      const canUse = Math.min(remaining, iv.to - iv.from);
      if(canUse < 0.0001) continue;
      slots.push({wid, date: d, startH: iv.from, endH: iv.from + canUse});
      remaining -= canUse;
    }
    d = addDays(d, 1);
    clockFrom = dayStartH; // from next day always start at shift begin
  }

  const last = slots[slots.length - 1];
  return {slots, endDate: last ? last.date : startDate, endH: last ? last.endH : fromClockH};
}

// ═══════════════════════════════════════════════════════════════════
// ASSIGN JOB
// ═══════════════════════════════════════════════════════════════════
function profClass(p){
  if(p=='2320')return'2320';if(p=='2325')return'2325';if(p=='2321')return'2321';return'other';
}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

function onCinChange(){
  const id=document.getElementById('cin-select').value;
  const cin=S.cinnosti.find(c=>c.id==id);
  const info=document.getElementById('cin-info');
  const nhEl=document.getElementById('nh-val');
  if(cin){
    nhEl.value=cin.nh;
    info.innerHTML=`<span class="prof-badge pf-${profClass(cin.prof)}">${cin.prof}</span>&ensp;${cin.desc||''}&ensp;&middot;&ensp;<strong style="color:var(--acc)">${cin.nh} Nh</strong>`;
  }else{nhEl.value='';info.innerHTML='';}
}

function assignJob(){
  const cinId=document.getElementById('cin-select').value;
  const nh=parseFloat(document.getElementById('nh-val').value);
  const pocet=parseInt(document.getElementById('pocet').value);
  const startDateRaw=document.getElementById('startDate').value;
  const startTimeStr=document.getElementById('startTime').value||'06:00';
  const allowSat=document.getElementById('allow-sat').checked;
  const allowSun=document.getElementById('allow-sun').checked;
  const msgEl=document.getElementById('assign-msg');
  msgEl.innerHTML='';

  if(!cinId){msgEl.innerHTML='<div class="alert alert-err">Vyber činnosť.</div>';return;}
  if(!nh||nh<=0){msgEl.innerHTML='<div class="alert alert-err">Zadaj platné Nh.</div>';return;}
  if(!pocet||pocet<1){msgEl.innerHTML='<div class="alert alert-err">Zadaj počet ľudí.</div>';return;}
  if(!startDateRaw){msgEl.innerHTML='<div class="alert alert-err">Zadaj dátum začiatku.</div>';return;}
  if(!isWorkday(startDateRaw,allowSat,allowSun)){
    msgEl.innerHTML='<div class="alert alert-warn">Zvolený dátum je víkend a víkendová práca nie je povolená. Povol sobotu/nedeľu alebo zvoľ iný dátum.</div>';return;
  }

  const cin=S.cinnosti.find(c=>c.id==cinId);
  const profWorkers=S.workers.filter(w=>w.prof==cin.prof);
  if(!profWorkers.length){msgEl.innerHTML=`<div class="alert alert-err">Žiadni pracovníci s profesiou <b>${cin.prof}</b>. Pridaj ich do záložky Pracovníci.</div>`;return;}

  const parts=startTimeStr.split(':').map(Number);
  const startH=parts[0]+(parts[1]/60); // shift start clock hour, e.g. 6.0
  const nhPerWorker=nh/pocet;

  // BUG2 FIX:
  // For each worker compute free hours on startDate (and next 60 days total).
  // A worker is "available" if they have ≥ a minimal slot free somewhere from startDate.
  // We pick the pocet workers with MOST free capacity on/near startDate — distributes load evenly.
  const workerCapacity = profWorkers.map(w => {
    const durationH = w.hours || 8;
    // Count total free hours in next 30 days starting from startDate
    let totalFree = 0;
    for(let i = 0; i < 30; i++){
      const dd = addDays(startDateRaw, i);
      if(!isWorkday(dd, allowSat, allowSun)) continue;
      const clockFrom = (i === 0) ? startH : startH;
      const ivs = freeIntervalsOnDay(w.id, dd, startH, durationH, clockFrom);
      totalFree += ivs.reduce((s, iv) => s + (iv.to - iv.from), 0);
    }
    return {w, totalFree};
  });

  // Sort: workers with most free hours first (most available = assigned first)
  workerCapacity.sort((a, b) => b.totalFree - a.totalFree);

  const avail = workerCapacity.filter(wc => wc.totalFree > 0.0001).map(wc => wc.w);

  if(avail.length < pocet){
    const hints = profWorkers.map(w => {
      const durationH = w.hours || 8;
      for(let i = 0; i < 90; i++){
        const dd = addDays(startDateRaw, i);
        if(!isWorkday(dd, allowSat, allowSun)) continue;
        const ivs = freeIntervalsOnDay(w.id, dd, startH, durationH, startH);
        if(ivs.length && ivs[0].to - ivs[0].from > 0.01)
          return `${w.name} — voľný od <strong>${fmtDT(dd, ivs[0].from)}</strong>`;
      }
      return `${w.name} — žiadna dostupnosť v horizonte 90 dní`;
    }).join('<br>');
    msgEl.innerHTML=`<div class="alert alert-err">Nedostatok voľných pracovníkov [<b>${cin.prof}</b>]: ${avail.length}/${pocet} dostupných.</div>
    <div class="alert alert-info" style="margin-top:6px"><b>Najbližšia dostupnosť:</b><br>${hints}</div>`;
    return;
  }

  const chosen = avail.slice(0, pocet);
  let allSlots = [];
  let latestEnd = {date: startDateRaw, h: startH};

  chosen.forEach(w => {
    const durationH = w.hours || 8;
    const {slots, endDate, endH} = scheduleWorker(w.id, nhPerWorker, startDateRaw, startH, startH, durationH, allowSat, allowSun);
    allSlots = allSlots.concat(slots);
    if(endDate > latestEnd.date || (endDate === latestEnd.date && endH > latestEnd.h)){
      latestEnd = {date: endDate, h: endH};
    }
  });

  const uniqueDays=new Set(allSlots.map(s=>s.date)).size;

  S.jobs.unshift({
    id:S.nextJobId++,
    cinId,cid:cin.cid,cinName:cin.name,desc:cin.desc||'',prof:cin.prof,
    nh,pocet,startDate:startDateRaw,startH,
    endDate:latestEnd.date,endH:latestEnd.h,
    nhPerWorker,workdays:uniqueDays,
    workerIds:chosen.map(w=>w.id),
    workerNames:chosen.map(w=>w.name),
    schedule:allSlots,
    allowSat,allowSun,
    done:false,
  });
  save();renderAll();

  msgEl.innerHTML=`<div class="alert alert-ok">
    ✓ Priradení: <strong>${chosen.map(w=>w.name).join(', ')}</strong><br>
    Začiatok: <strong>${fmtDT(startDateRaw,startH)}</strong> &nbsp;→&nbsp; Koniec: <strong>${fmtDT(latestEnd.date,latestEnd.h)}</strong><br>
    ${nhPerWorker.toFixed(2)} Nh/os. &nbsp;·&nbsp; ${uniqueDays} pracovných dní &nbsp;·&nbsp; začiatok každý deň o ${fmtH(startH)}
    ${allowSat||allowSun?'<br><span style="color:var(--teal)">Víkendová práca: '+(allowSat?'So ':'')+(allowSun?'Ne ':'')+' povolená</span>':''}
  </div>`;
}

function markDone(id){const j=S.jobs.find(j=>j.id==id);if(j)j.done=!j.done;save();renderAll();}
function removeJob(id){if(!confirm('Odstrániť úlohu?'))return;S.jobs=S.jobs.filter(j=>j.id!=id);save();renderAll();}
function filterJobs(f,el){jobFilter=f;document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');renderJobs();}

// ═══════════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════════
function renderStats(){
  const active=S.jobs.filter(j=>!j.done);
  const totalNh=active.reduce((s,j)=>s+j.nh,0);
  const busyW=new Set(active.flatMap(j=>j.workerIds)).size;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="stat-n">${active.length}</div><div class="stat-l">Aktívne úlohy</div></div>
    <div class="stat-card blue"><div class="stat-n">${S.jobs.filter(j=>j.done).length}</div><div class="stat-l">Splnené</div></div>
    <div class="stat-card green"><div class="stat-n">${totalNh.toFixed(0)}</div><div class="stat-l">Nh v pláne</div></div>
    <div class="stat-card purple"><div class="stat-n">${busyW}/${S.workers.length}</div><div class="stat-l">Obsadení</div></div>`;
  document.getElementById('sb-w').textContent=S.workers.length;
  document.getElementById('sb-c').textContent=S.cinnosti.length;
  document.getElementById('sb-j').textContent=active.length;
}

function renderJobs(){
  const el=document.getElementById('jobs-list');
  let jobs=[...S.jobs];
  if(jobFilter=='active')jobs=jobs.filter(j=>!j.done);
  if(jobFilter=='done')jobs=jobs.filter(j=>j.done);
  if(!jobs.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">◌</div>Žiadne úlohy</div>';return;}
  el.innerHTML=jobs.map(j=>`
    <div class="job-card${j.done?' done-card':''}">
      <div class="job-head">
        <div style="flex:1">
          <div class="job-tag-line">
            <span class="job-id-tag">${j.cid||j.cinId}</span>
            <span class="prof-badge pf-${profClass(j.prof)}">${j.prof}</span>
            ${j.allowSat?'<span style="font-size:10px;color:var(--teal);font-weight:600">So</span>':''}

function renderGantt(){
  const el=document.getElementById('gantt-content');
  const jobs=S.jobs.filter(j=>j.startDate&&j.endDate);
  if(!jobs.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">▤</div>Žiadne úlohy</div>';return;}

  const fi=document.getElementById('gantt-from').value;
  const ti=document.getElementById('gantt-to').value;
  const allD=jobs.flatMap(j=>[j.startDate,j.endDate]);
  const minD=fi||allD.reduce((a,b)=>a<b?a:b);
  const maxD=addDays(ti||allD.reduce((a,b)=>a>b?a:b),1);

  const dates=[];let d=minD;
  while(d<=maxD){dates.push(d);d=addDays(d,1);}
  if(dates.length>120){el.innerHTML='<div class="alert alert-warn">Rozsah príliš veľký (max 120 dní). Uprav filtre.</div>';return;}

  // Build lookup: schedMap[date][jobId] -> [{wid,startH,endH}]
  const schedMap={};
  S.jobs.forEach(j=>{
    if(!j.schedule)return;
    j.schedule.forEach(s=>{
      if(!schedMap[s.date])schedMap[s.date]={};
      if(!schedMap[s.date][j.id])schedMap[s.date][j.id]=[];
      schedMap[s.date][j.id].push(s);
    });
  });

  let html='<div style="min-width:500px">';
  // Header
  const DAY=['Ne','Po','Ut','St','Št','Pi','So'];
  html+=`<div class="gantt-header-row"><div class="g-label">Úloha / pracovník</div><div class="g-days">`;
  dates.forEach(dt=>{
    const s=isSat(dt),u=isSun(dt);
    const cls=s?'g-dh sat-work':u?'g-dh sun-work':(s||u)?'g-dh wend':'g-dh';
    html+=`<div class="${cls}" title="${fmtDate(dt)}">${new Date(dt+'T12:00').getDate()}<br>${DAY[dow(dt)]}</div>`;
  });
  html+='</div></div>';

  jobs.forEach(j=>{
    // Job header row
    html+=`<div class="g-row" style="background:rgba(255,255,255,0.015)">
      <div class="g-name" style="font-weight:600;color:var(--text)">
        <span class="prof-badge pf-${profClass(j.prof)}">${j.prof}</span>
        <span style="overflow:hidden;text-overflow:ellipsis">${j.cinName.slice(0,20)}</span>
      </div>
      <div class="g-cells">`;
    dates.forEach(dt=>{
      const sat=isSat(dt),sun=isSun(dt);
      const cls='g-cell'+(sat?' sat-work':sun?' sun-work':'');
      const daySlots=(schedMap[dt]||{})[j.id]||[];
      const totalH=daySlots.reduce((s,x)=>s+(x.endH-x.startH),0);
      const workerMaxH=Math.max(...j.workerIds.map(wid=>S.workers.find(w=>w.id===wid)?.hours||8));
      const frac=Math.min(1,totalH/workerMaxH);
      const barCls=j.done?'g-bar bar-done':sat?'g-bar bar-sat':sun?'g-bar bar-sun':'g-bar bar-work';
      const tip=daySlots.map(s=>`${s.wid} ${fmtH(s.startH)}-${fmtH(s.endH)}`).join(' ');
      html+=`<div class="${cls}" title="${fmtDate(dt)}: ${totalH.toFixed(1)}h">${frac>0.01?`<div class="${barCls}" style="width:${Math.round(frac*100)}%"></div>`:''}
      </div>`;
    });
    html+='</div></div>';

    // Worker sub-rows
    j.workerIds.forEach(wid=>{
      const w=S.workers.find(x=>x.id===wid);
      if(!w)return;
      html+=`<div class="g-row g-sub-row">
        <div class="g-name" style="padding-left:20px;font-size:10px;color:var(--text3)">
          <span class="avatar av-${profClass(w.prof)}" style="width:18px;height:18px;font-size:8px;flex-shrink:0">${initials(w.name)}</span>
          ${w.name} <span style="color:var(--acc);margin-left:4px">${w.hours}h</span>
        </div>
        <div class="g-cells">`;
      dates.forEach(dt=>{
        const sat=isSat(dt),sun=isSun(dt);
        const cls='g-cell'+(sat?' sat-work':sun?' sun-work':'');
        const wSlots=((schedMap[dt]||{})[j.id]||[]).filter(s=>s.wid===wid);
        const h=wSlots.reduce((s,x)=>s+(x.endH-x.startH),0);
        const frac=Math.min(1,h/(w.hours||8));
        const barCls=j.done?'g-bar bar-done':sat?'g-bar bar-sat':sun?'g-bar bar-sun':'g-bar bar-work';
        const tip=wSlots.map(s=>`${fmtH(s.startH)}-${fmtH(s.endH)}`).join(', ');
        html+=`<div class="${cls}" title="${fmtDate(dt)}: ${tip||'voľný'}">${frac>0.01?`<div class="${barCls}" style="width:${Math.round(frac*100)}%;opacity:0.65"></div>`:''}
        </div>`;
      });
      html+='</div></div>';
    });
  });

  html+='</div>';
  el.innerHTML=html;
}

  const today=todayStr();
  el.innerHTML=S.workers.map(w=>{
    const bj=S.jobs.filter(j=>!j.done&&j.workerIds.includes(w.id));
    // 7-day mini heatmap
    const days7=Array.from({length:7},(_,i)=>addDays(today,i));
    const DAY=['Ne','Po','Ut','St','Št','Pi','So'];
    const wDayStart=6; // default shift start 06:00
    const heatmap=days7.map(d=>{
      const slots=getWorkerSlots(w.id).filter(s=>s.date===d);
      const h=slots.reduce((s,x)=>s+(x.endH-x.startH),0);
      const max=w.hours||8;
      const pct=Math.min(1,h/max);
      let bg=pct===0?'rgba(255,255,255,0.05)':pct>=1?'rgba(239,68,68,0.25)':'rgba(240,165,0,0.2)';

        <div style="font-size:8px;color:var(--text3);margin-top:2px">${DAY[dow(d)]}</div>

    return `<div class="w-row">

function handleDropCin(e){e.preventDefault();document.getElementById('drop-cin').classList.remove('drag');handleFileCin(e.dataTransfer.files[0]);}
function handleFileCin(file){
  if(!file)return;
  const msg=document.getElementById('import-cin-msg');
  const prev=document.getElementById('import-cin-preview');
  msg.innerHTML='<div class="alert alert-info">Načítavam...</div>';prev.innerHTML='';
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
      const imported=[];let skipped=0;
      rows.forEach(row=>{
        const cid=String(row[2]||'').trim();
        const name=String(row[3]||'').trim();
        const desc=String(row[4]||'').trim();
        let prof=String(row[5]||'').trim().split(/[\s+]/)[0].replace(/\D/g,'');
        const nhRaw=parseFloat(String(row[12]||'').replace(',','.'));
        if(!cid||!name||isNaN(nhRaw)||nhRaw<=0){skipped++;return;}
        if(S.cinnosti.some(c=>c.cid==cid)){skipped++;return;}
        if(prof.length<3)prof=String(row[5]||'').trim();
        imported.push({id:'IMP'+S.nextCinId++,cid,name,desc,prof,nh:nhRaw});
      });
      if(!imported.length){msg.innerHTML='<div class="alert alert-err">Nenašli sa platné riadky.</div>';return;}
      window._impCin=imported;
      msg.innerHTML=`<div class="alert alert-ok">Nájdených ${imported.length}, preskočených ${skipped}.</div>`;
      prev.innerHTML=`<div style="overflow-x:auto;margin-top:10px"><table class="tbl"><thead><tr><th>ID</th><th>Názov</th><th>Profesia</th><th>Nh</th></tr></thead>
        <tbody>${imported.slice(0,15).map(c=>`<tr><td><span class="job-id-tag">${c.cid}</span></td><td>${c.name}</td><td><span class="prof-badge pf-${profClass(c.prof)}">${c.prof}</span></td><td style="color:var(--acc);font-family:var(--font-mono)">${c.nh}</td></tr>`).join('')}
        ${imported.length>15?`<tr><td colspan="4" style="text-align:center;color:var(--text3)">... a ďalších ${imported.length-15}</td></tr>`:''}</tbody></table></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-accent" onclick="confirmImpCin()">Importovať ${imported.length}</button>
          <button class="btn btn-outline" onclick="document.getElementById('import-cin-preview').innerHTML=''">Zrušiť</button>
        </div>`;
    }catch(err){msg.innerHTML=`<div class="alert alert-err">Chyba: ${err.message}</div>`;}
  };
  reader.readAsArrayBuffer(file);
}
function confirmImpCin(){if(!window._impCin)return;window._impCin.forEach(c=>S.cinnosti.push(c));save();renderAll();document.getElementById('import-cin-preview').innerHTML='';document.getElementById('import-cin-msg').innerHTML=`<div class="alert alert-ok">✓ Importovaných ${window._impCin.length} činností.</div>`;window._impCin=null;}

function handleDropWkr(e){e.preventDefault();document.getElementById('drop-wkr').classList.remove('drag');handleFileWkr(e.dataTransfer.files[0]);}
function handleFileWkr(file){
  if(!file)return;
  const msg=document.getElementById('import-wkr-msg');
  const prev=document.getElementById('import-wkr-preview');
  msg.innerHTML='<div class="alert alert-info">Načítavam...</div>';prev.innerHTML='';
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
      const imported=[];let skipped=0;
      rows.forEach((row,ri)=>{
        const name=String(row[0]||'').trim();
        const prof=String(row[1]||'').trim();
        const hrs=parseFloat(String(row[2]||'8').replace(',','.'));
        const hours=isNaN(hrs)?8:hrs;
        if(!name||!prof){skipped++;return;}
        if(ri===0&&(name.toLowerCase().includes('meno')||name.toLowerCase().includes('name'))){skipped++;return;}
        if(S.workers.some(w=>w.name==name&&w.prof==prof)){skipped++;return;}
        imported.push({id:S.nextWorkerId++,name,prof,hours});
      });
      if(!imported.length){msg.innerHTML='<div class="alert alert-err">Nenašli sa platné riadky.</div>';return;}
      window._impWkr=imported;
      msg.innerHTML=`<div class="alert alert-ok">Nájdených ${imported.length} pracovníkov.</div>`;
      prev.innerHTML=`<div style="overflow-x:auto;margin-top:10px"><table class="tbl"><thead><tr><th>Meno</th><th>Profesia</th><th>H/deň</th></tr></thead>
        <tbody>${imported.slice(0,15).map(w=>`<tr><td style="font-weight:600;color:var(--text)">${w.name}</td><td><span class="prof-badge pf-${profClass(w.prof)}">${w.prof}</span></td><td style="color:var(--acc);font-family:var(--font-mono)">${w.hours}</td></tr>`).join('')}
        ${imported.length>15?`<tr><td colspan="3" style="text-align:center;color:var(--text3)">... a ďalších ${imported.length-15}</td></tr>`:''}</tbody></table></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-accent" onclick="confirmImpWkr()">Importovať ${imported.length}</button>
          <button class="btn btn-outline" onclick="document.getElementById('import-wkr-preview').innerHTML=''">Zrušiť</button>
        </div>`;
    }catch(err){msg.innerHTML=`<div class="alert alert-err">Chyba: ${err.message}</div>`;}
  };
  reader.readAsArrayBuffer(file);
}
function confirmImpWkr(){if(!window._impWkr)return;window._impWkr.forEach(w=>S.workers.push(w));save();renderAll();document.getElementById('import-wkr-preview').innerHTML='';document.getElementById('import-wkr-msg').innerHTML=`<div class="alert alert-ok">✓ Importovaných ${window._impWkr.length} pracovníkov.</div>`;window._impWkr=null;}

function exportAll(){
  const wb=XLSX.utils.book_new();

  const planData=[['#','Kód','Názov','Popis','Profesia','Nh celkom','Ľudia','Nh/os','Začiatok','Koniec','Prac.dní','Sobota','Nedeľa','Pracovníci','Stav']];
  S.jobs.forEach((j,i)=>{
    planData.push([i+1,j.cid||'',j.cinName,j.desc||'',j.prof,j.nh,j.pocet,
      parseFloat(j.nhPerWorker.toFixed(2)),
      fmtDate(j.startDate)+' '+fmtH(j.startH||6),
      fmtDate(j.endDate)+' '+fmtH(j.endH||0),
      j.workdays||'',j.allowSat?'Áno':'Nie',j.allowSun?'Áno':'Nie',
      j.workerNames.join(', '),j.done?'Splnená':'Aktívna']);
  });
  const wsPlan=XLSX.utils.aoa_to_sheet(planData);
  wsPlan['!cols']=[{wch:3},{wch:13},{wch:28},{wch:30},{wch:9},{wch:9},{wch:6},{wch:8},{wch:18},{wch:18},{wch:8},{wch:7},{wch:7},{wch:35},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wsPlan,'Plán úloh');

  // Hourly detail sheet
  const detData=[['Úloha','Kód','Profesia','Pracovník','Dátum','Začiatok','Koniec','Hodiny']];
  S.jobs.forEach(j=>{
    if(!j.schedule)return;
    j.schedule.forEach(s=>{
      const w=S.workers.find(x=>x.id==s.wid);
      detData.push([j.cinName,j.cid||'',j.prof,w?w.name:'?',fmtDate(s.date),fmtH(s.startH),fmtH(s.endH),parseFloat((s.endH-s.startH).toFixed(2))]);
    });
  });
  const wsDet=XLSX.utils.aoa_to_sheet(detData);
  wsDet['!cols']=[{wch:28},{wch:13},{wch:9},{wch:20},{wch:13},{wch:7},{wch:7},{wch:7}];
  XLSX.utils.book_append_sheet(wb,wsDet,'Hodinový plán');

  const wData=[['Meno','Profesia','H/deň','Stav','Úlohy']];
  S.workers.forEach(w=>{
    const bj=S.jobs.filter(j=>!j.done&&j.workerIds.includes(w.id));
    wData.push([w.name,w.prof,w.hours||8,bj.length?'Obsadený':'Voľný',bj.map(j=>j.cinName).join('; ')]);
  });
  const wsW=XLSX.utils.aoa_to_sheet(wData);
  wsW['!cols']=[{wch:22},{wch:10},{wch:8},{wch:10},{wch:50}];
  XLSX.utils.book_append_sheet(wb,wsW,'Pracovníci');

  const cData=[['ID','Kód','Názov','Popis','Profesia','Nh']];
  S.cinnosti.forEach(c=>cData.push([c.id,c.cid||'',c.name,c.desc||'',c.prof,c.nh]));
  const wsC=XLSX.utils.aoa_to_sheet(cData);
  wsC['!cols']=[{wch:10},{wch:13},{wch:34},{wch:38},{wch:11},{wch:7}];
  XLSX.utils.book_append_sheet(wb,wsC,'Činnosti');

  XLSX.writeFile(wb,'WorkPlan_'+todayStr()+'.xlsx');
}

        if(accounts.length > 0){
          msalAccount = accounts[0];
          onLoginSuccess();
        }
      }
    }).catch(err => {
      console.warn('MSAL redirect error:', err);
      showApp(false);
    });
  } catch(e){
    console.warn('MSAL init failed:', e);
    showApp(false);
  }
}

async function msLogin(){
  try{
    setSyncStatus('syncing','Prihlasovanie...');
    await msalApp.loginPopup({scopes: OD_SCOPES});
    const accounts = msalApp.getAllAccounts();
    if(accounts.length > 0){
      msalAccount = accounts[0];
      onLoginSuccess();
    }
  } catch(e){
    console.warn('Login error:', e);
    if(e.errorCode === 'user_cancelled') return;
    // Fallback to redirect if popup blocked
    msalApp.loginRedirect({scopes: OD_SCOPES});
  }
}

function msLogout(){
  if(msalApp && msalAccount){
    msalApp.logoutPopup({account: msalAccount}).catch(()=>{});
  }
  msalAccount = null;
  syncEnabled = false;
  clearInterval(syncTimer);
  renderUserArea(null);
  setSyncStatus('offline','Nepripojený');
}

async function getToken(){
  if(!msalApp || !msalAccount) return null;
  try{
    const resp = await msalApp.acquireTokenSilent({scopes: OD_SCOPES, account: msalAccount});
    return resp.accessToken;
  } catch(e){
    try{
      const resp = await msalApp.acquireTokenPopup({scopes: OD_SCOPES, account: msalAccount});
      return resp.accessToken;
    } catch(e2){ return null; }
  }
}

async function onLoginSuccess(){
  showApp(true);
  syncEnabled = true;
  renderUserArea(msalAccount);
  document.getElementById('sync-bar').style.display='flex';
  setSyncStatus('syncing','Načítavam z OneDrive...');
  await odLoad();
  // Auto-refresh every 30 seconds
  syncTimer = setInterval(odPoll, 30000);
}

function skipLogin(){
  showApp(true);
  document.getElementById('sync-bar').style.display='none';
}

function showApp(show){
  document.getElementById('login-overlay').style.display = show ? 'none' : 'flex';
  document.getElementById('app-shell').style.display = show ? 'grid' : 'none';
}

function setSyncStatus(state, label){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(!dot) return;
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

function renderUserArea(account){
  const el = document.getElementById('user-area');
  if(!account){el.innerHTML='';return;}
  const name = account.name || account.username || 'User';
  const initials2 = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  el.innerHTML=`<div class="user-chip">
    <div class="user-avatar">${initials2}</div>
    <span>${name.split(' ')[0]}</span>
    <button class="btn-ms-out" onclick="msLogout()" style="margin-left:4px;padding:2px 7px;font-size:10px">Odhlásiť</button>
  </div>`;
}

// ── OneDrive read/write ──────────────────────────────────────────
async function odGetFileUrl(){
  // Returns {id, downloadUrl, etag} or null
  const token = await getToken();
  if(!token) return null;
  const resp = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/root:/${OD_FILE_NAME}`,
    {headers: {Authorization: `Bearer ${token}`}}
  );
  if(resp.status === 404) return {exists: false, token};
  if(!resp.ok) return null;
  const data = await resp.json();
  return {exists: true, id: data.id, etag: data.eTag, token};
}

async function odLoad(){
  try{
    const token = await getToken();
    if(!token){setSyncStatus('error','Token chyba');return;}

    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/root:/${OD_FILE_NAME}:/content`,
      {headers: {Authorization: `Bearer ${token}`}}
    );

    if(resp.status === 404){
      // File doesn't exist yet — create it with current local data
      setSyncStatus('syncing','Vytváram súbor na OneDrive...');
      await odSave(true);
      return;
    }
    if(!resp.ok){setSyncStatus('error','Chyba načítania');return;}

    const etag = resp.headers.get('ETag') || resp.headers.get('etag');
    const remote = await resp.json();

    // Merge: remote wins for jobs/cinnosti/workers added by others,
    // but we keep local if remote has older nextJobId
    if(remote && typeof remote === 'object'){
      // Simple strategy: if remote nextJobId > local, remote is newer → use remote
      if((remote.nextJobId||0) >= (S.nextJobId||0)){
        S = remote;
        save();
        renderAll();
        setSyncStatus('synced', 'Synchronizované ' + new Date().toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'}));
      } else {
        setSyncStatus('synced','Lokálne dáta sú novšie');
      }
      lastSyncEtag = etag;
    }
  } catch(e){
    setSyncStatus('error','Chyba: '+e.message);
  }
}

async function odSave(force=false){
  if(!syncEnabled || isSaving) return;
  isSaving = true;
  try{
    const token = await getToken();
    if(!token){isSaving=false;return;}
    setSyncStatus('syncing','Ukladám...');
    const body = JSON.stringify(S);
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/root:/${OD_FILE_NAME}:/content`,
      {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json',
        },
        body,
      }
    );
    if(resp.ok){
      const data = await resp.json();
      lastSyncEtag = data.eTag;
      setSyncStatus('synced','Uložené ' + new Date().toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'}));
    } else {
      setSyncStatus('error','Chyba ukladania ('+resp.status+')');
    }
  } catch(e){
    setSyncStatus('error','Offline?');
  }
  isSaving = false;
}

async function odPoll(){
  // Check if remote changed (ETag mismatch) → reload
  if(!syncEnabled) return;
  try{
    const token = await getToken();
    if(!token) return;
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/root:/${OD_FILE_NAME}`,
      {headers: {Authorization: `Bearer ${token}`}}
    );
    if(!resp.ok) return;
    const meta = await resp.json();
    const remoteEtag = meta.eTag;
    if(remoteEtag && remoteEtag !== lastSyncEtag){
      setSyncStatus('syncing','Kolega zmenil dáta, načítavam...');
      await odLoad();
    }
  } catch(e){}
}

// Override save() to also trigger OneDrive save
const _localSave = save;
function save(){
  _localSave();
  // Debounce OD save by 1.5s to batch rapid changes
  clearTimeout(save._odTimer);
  save._odTimer = setTimeout(()=>odSave(), 1500);
}

// Wait for MSAL to be available then init
function waitForMsal(tries){
  if(tries<=0){
    console.warn('MSAL not loaded, showing app without sync');
    showApp(true);
    return;
  }
  if(typeof msal !== 'undefined'){
    initMsal();
  } else {
    setTimeout(()=>waitForMsal(tries-1), 200);
  }
}
